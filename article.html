<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>경제안보 인사이트</title>
  <meta name="description" content="경제안보 인사이트 기사" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400;1,700&family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,600&family=Source+Sans+3:wght@400;600;700&family=Noto+Serif+KR:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy:  #112e51;
      --blue:  #205493;
      --wine:  #7a1a35;
      --gold:  #fdb81e;
      --white: #ffffff;
      --light: #f5f5f5;
      --gray:  #5b616b;
      --text:  #1a1a1a;
      --border:#d6d7d9;
      --link:  #0071bc;
      --red:   #E3120B;
      --font-body:    'Lora', 'Noto Serif KR', Georgia, serif;
      --font-heading: 'Playfair Display', 'Noto Serif KR', Georgia, serif;
      --font-ui:      'Source Sans 3', 'Noto Serif KR', sans-serif;
    }
    html { font-size: 17px; }
    body { font-family: var(--font-body); color: var(--text); background: var(--white); line-height: 1.75; }
    a { color: var(--link); text-decoration: none; }
    a:hover { text-decoration: underline; color: var(--navy); }

    /* ── HEADER ── */
    .site-header { background: var(--navy); padding: 14px 0; border-bottom: 3px solid var(--gold); }
    .site-header-inner { max-width: 1100px; margin: 0 auto; padding: 0 20px; display: flex; align-items: center; gap: 16px; }
    .site-seal { width: 52px; height: 52px; border-radius: 3px; background: var(--red); flex-shrink: 0; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 10px rgba(0,0,0,.4); text-decoration: none; }
    .site-seal svg { width: 52px; height: 52px; }
    .site-name-block { color: var(--white); }
    .site-name-ko { font-family: 'Noto Serif KR', Georgia, serif; font-size: 1.35rem; font-weight: 700; line-height: 1.2; }
    .site-name-en { font-size: .78rem; font-weight: 400; font-style: italic; opacity: .7; font-family: 'Playfair Display', serif; }
    .header-back { margin-left: auto; }
    .header-back a { color: rgba(255,255,255,.7); font-size: 13px; font-family: var(--font-ui); border: 1px solid rgba(255,255,255,.25); padding: 5px 14px; border-radius: 2px; transition: all .15s; }
    .header-back a:hover { background: rgba(255,255,255,.12); color: var(--gold); border-color: var(--gold); text-decoration: none; }

    /* ── BREADCRUMB ── */
    .breadcrumb { max-width: 720px; margin: 20px auto 0; padding: 0 20px; font-family: var(--font-ui); font-size: 12.5px; color: var(--gray); }
    .breadcrumb a { color: var(--gray); }
    .breadcrumb a:hover { color: var(--link); }
    .breadcrumb span { margin: 0 6px; opacity: .5; }

    /* ── ARTICLE WRAPPER ── */
    .article-wrapper { max-width: 720px; margin: 0 auto; padding: 28px 20px 60px; }

    /* ── ARTICLE HEADER ── */
    .article-cat-label { display: inline-block; font-family: var(--font-ui); font-size: 11px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--white); background: var(--blue); padding: 3px 10px; margin-bottom: 16px; }
    .article-title { font-family: var(--font-heading); font-size: 2.1rem; font-weight: 700; line-height: 1.28; color: var(--navy); margin-bottom: 16px; }
    .article-meta { display: flex; align-items: center; gap: 16px; font-family: var(--font-ui); font-size: 13px; color: var(--gray); padding-bottom: 18px; border-bottom: 2px solid var(--navy); margin-bottom: 24px; flex-wrap: wrap; }
    .article-meta .author { font-weight: 600; color: var(--text); }
    .article-meta .dot { opacity: .35; }

    /* ── HERO IMAGE ── */
    .article-hero-img { width: 100%; max-height: 420px; object-fit: cover; margin-bottom: 28px; border-radius: 2px; }

    /* ── ARTICLE BODY ── */
    .article-body { font-family: var(--font-body); font-size: 1.05rem; line-height: 1.85; color: var(--text); }
    .article-body p { margin-bottom: 1.4em; }
    .article-body h1,
    .article-body h2 { font-family: var(--font-heading); font-size: 1.45rem; font-weight: 700; color: var(--navy); margin: 2em 0 .6em; padding-bottom: 6px; border-bottom: 2px solid var(--gold); }
    .article-body h3 { font-family: var(--font-heading); font-size: 1.2rem; font-weight: 700; color: var(--navy); margin: 1.6em 0 .5em; }
    .article-body h4 { font-family: var(--font-ui); font-size: 1rem; font-weight: 700; color: var(--gray); margin: 1.4em 0 .4em; text-transform: uppercase; letter-spacing: .06em; }
    .article-body blockquote { border-left: 4px solid var(--gold); padding: 12px 20px; margin: 1.6em 0; background: #fffbf0; font-style: italic; color: var(--gray); }
    .article-body ul, .article-body ol { padding-left: 1.6em; margin-bottom: 1.4em; }
    .article-body li { margin-bottom: .4em; }
    .article-body strong { font-weight: 700; color: var(--navy); }
    .article-body em { font-style: italic; }
    .article-body a { color: var(--link); border-bottom: 1px solid rgba(0,113,188,.3); }
    .article-body a:hover { border-bottom-color: var(--link); text-decoration: none; }
    .article-body hr { border: none; border-top: 1px solid var(--border); margin: 2em 0; }
    .article-body table { width: 100%; border-collapse: collapse; margin-bottom: 1.4em; font-size: .95rem; }
    .article-body th { background: var(--navy); color: var(--white); padding: 8px 12px; text-align: left; font-family: var(--font-ui); }
    .article-body td { padding: 8px 12px; border-bottom: 1px solid var(--border); }
    .article-body tr:nth-child(even) td { background: var(--light); }
    .article-body code { background: var(--light); padding: 2px 6px; border-radius: 3px; font-size: .9em; font-family: monospace; }
    .article-body pre { background: #1a1a2e; color: #e0e0e0; padding: 18px; border-radius: 4px; overflow-x: auto; margin-bottom: 1.4em; }
    .article-body pre code { background: none; color: inherit; }

    /* ── DESCRIPTION LEAD ── */
    .article-lead { font-size: 1.15rem; font-weight: 500; color: var(--gray); line-height: 1.7; margin-bottom: 24px; font-style: italic; border-left: 4px solid var(--blue); padding-left: 16px; }

    /* ── FOOTER ── */
    .article-footer { margin-top: 40px; padding-top: 24px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
    .article-tags { display: flex; gap: 6px; flex-wrap: wrap; }
    .article-tag { background: var(--light); border: 1px solid var(--border); color: var(--gray); font-family: var(--font-ui); font-size: 11.5px; padding: 3px 10px; border-radius: 2px; }
    .back-btn { font-family: var(--font-ui); font-size: 13px; color: var(--link); border: 1px solid var(--border); padding: 7px 18px; border-radius: 2px; transition: all .15s; }
    .back-btn:hover { background: var(--navy); color: var(--white); border-color: var(--navy); text-decoration: none; }

    /* ── LOADING / ERROR ── */
    .loading-state { text-align: center; padding: 80px 20px; color: var(--gray); font-family: var(--font-ui); }
    .loading-spinner { display: inline-block; width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin .8s linear infinite; margin-bottom: 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-state { text-align: center; padding: 80px 20px; }
    .error-state h2 { font-family: var(--font-heading); color: var(--navy); margin-bottom: 10px; }
    .error-state p { color: var(--gray); font-family: var(--font-ui); font-size: 14px; }

    /* ── SITE FOOTER ── */
    .site-footer { background: var(--navy); color: rgba(255,255,255,.6); text-align: center; padding: 20px; font-family: var(--font-ui); font-size: 12.5px; border-top: 3px solid var(--gold); }
    .site-footer a { color: var(--gold); }

    @media (max-width: 680px) {
      .article-title { font-size: 1.55rem; }
      .article-wrapper { padding: 20px 16px 40px; }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header class="site-header">
  <div class="site-header-inner">
    <a href="/" class="site-seal" aria-label="ESI 홈">
      <svg viewBox="0 0 52 52" xmlns="http://www.w3.org/2000/svg">
        <rect width="52" height="52" fill="#E3120B"/>
        <text x="26" y="35" text-anchor="middle"
          font-family="'Playfair Display', Georgia, serif"
          font-weight="700" font-size="19" letter-spacing="2.5"
          fill="white">ESI</text>
      </svg>
    </a>
    <div class="site-name-block">
      <div class="site-name-ko">경제안보 인사이트</div>
      <div class="site-name-en">Economic Security Insight</div>
    </div>
    <div class="header-back">
      <a href="/">← 홈으로</a>
    </div>
  </div>
</header>

<!-- MAIN -->
<main>
  <div id="breadcrumb-area"></div>
  <div class="article-wrapper" id="article-container">
    <div class="loading-state">
      <div class="loading-spinner"></div>
      <div>기사를 불러오는 중...</div>
    </div>
  </div>
</main>

<!-- FOOTER -->
<footer class="site-footer">
  <p>&copy; 2026 경제안보 인사이트 (Economic Security Insight) · <a href="/admin">관리자</a></p>
</footer>

<script>
// ── URL 파라미터 파싱 ──
const params = new URLSearchParams(window.location.search);
const fileParam = params.get('file');   // e.g. content/main/2026-06-14-minerals.md
const titleParam = params.get('title'); // fallback title (URL encoded)
const descParam  = params.get('desc');
const catParam   = params.get('cat');
const dateParam  = params.get('date');
const authorParam = params.get('author');
const imgParam   = params.get('img');

const container = document.getElementById('article-container');
const breadcrumbArea = document.getElementById('breadcrumb-area');

// ── YAML 프론트매터 파서 ──
function parseFrontmatter(text) {
  const meta = {};
  let body = text;
  const match = text.match(/^---\s*\n([\s\S]*?)\n---\s*\n([\s\S]*)$/);
  if (match) {
    const yaml = match[1];
    body = match[2];
    yaml.split('\n').forEach(line => {
      const m = line.match(/^(\w[\w-]*):\s*(.+)$/);
      if (m) meta[m[1].trim()] = m[2].trim().replace(/^["']|["']$/g, '');
    });
  }
  return { meta, body };
}

// ── 기사 렌더링 ──
function renderArticle(meta, bodyMd) {
  const title   = meta.title    || decodeURIComponent(titleParam || '기사');
  const cat     = meta.category || decodeURIComponent(catParam   || '');
  const date    = meta.date     || decodeURIComponent(dateParam  || '');
  const author  = meta.author   || decodeURIComponent(authorParam|| '편집부');
  const desc    = meta.description || decodeURIComponent(descParam || '');
  const img     = meta.image    || decodeURIComponent(imgParam   || '');

  // 페이지 제목 업데이트
  document.title = title + ' — 경제안보 인사이트';

  // 브레드크럼
  breadcrumbArea.innerHTML = `
    <div class="breadcrumb">
      <a href="/">홈</a>
      <span>›</span>
      ${cat ? `<a href="/">${cat}</a><span>›</span>` : ''}
      <span style="color:var(--text)">${title.length > 40 ? title.slice(0,40)+'…' : title}</span>
    </div>`;

  // 본문 HTML
  const bodyHtml = bodyMd.trim()
    ? marked.parse(bodyMd)
    : '<p style="color:var(--gray);font-style:italic">본문이 아직 작성되지 않았습니다.</p>';

  container.innerHTML = `
    ${cat ? `<div class="article-cat-label">${cat}</div>` : ''}
    <h1 class="article-title">${title}</h1>
    <div class="article-meta">
      <span class="author">${author}</span>
      ${date ? `<span class="dot">·</span><span>${date}</span>` : ''}
    </div>
    ${img ? `<img class="article-hero-img" src="${img}" alt="${title}" />` : ''}
    ${desc ? `<div class="article-lead">${desc}</div>` : ''}
    <div class="article-body" id="article-body"></div>
    <div class="article-footer">
      <div class="article-tags">
        ${cat ? `<span class="article-tag">${cat}</span>` : ''}
        <span class="article-tag">경제안보</span>
        <span class="article-tag">ESI</span>
      </div>
      <a class="back-btn" href="/">← 홈으로 돌아가기</a>
    </div>`;

  document.getElementById('article-body').innerHTML = bodyHtml;
}

// ── 에러 렌더링 ──
function renderError(msg) {
  container.innerHTML = `
    <div class="error-state">
      <h2>기사를 불러올 수 없습니다</h2>
      <p>${msg}</p>
      <p style="margin-top:20px"><a href="/" class="back-btn">← 홈으로 돌아가기</a></p>
    </div>`;
}

// ── 메인 로직 ──
async function loadArticle() {
  // 1) ?file= 파라미터가 있으면 마크다운 파일 fetch
  if (fileParam) {
    const url = '/' + fileParam.replace(/^\//, '');
    try {
      const res = await fetch(url);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const text = await res.text();
      const { meta, body } = parseFrontmatter(text);
      renderArticle(meta, body);
      return;
    } catch (e) {
      // 파일을 못 찾으면 URL 파라미터로 fallback
    }
  }

  // 2) URL 파라미터만으로 렌더링 (제목·설명·카테고리)
  if (titleParam) {
    renderArticle({}, '');
    return;
  }

  // 3) 아무 것도 없으면 에러
  renderError('기사 경로가 지정되지 않았습니다. URL에 <code>?file=</code> 파라미터를 확인해주세요.');
}

loadArticle();
</script>
</body>
</html>
