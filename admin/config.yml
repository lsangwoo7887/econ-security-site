backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

locale: ko

collections:
  - name: "main-articles"
    label: "메인 기사"
    label_singular: "기사"
    folder: "content/main"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {name: "title", label: "제목", widget: "string"}
      - name: "category"
        label: "카테고리"
        widget: "select"
        options: ["첨단기술경쟁","반도체·AI","공급망","에너지안보","식량안보","핵심광물","제재·수출통제","AI","글로벌 경제안보 일일동향"]
      - {name: "description", label: "요약", widget: "text"}
      - {name: "date", label: "날짜", widget: "string"}
      - {name: "author", label: "작성자", widget: "string", default: "편집부"}
      - {name: "image", label: "이미지", widget: "image", required: false}

  - name: "energy-food-articles"
    label: "에너지·식량 기사"
    label_singular: "기사"
    folder: "content/energy-food"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {name: "title", label: "제목", widget: "string"}
      - name: "category"
        label: "카테고리"
        widget: "select"
        options: ["에너지안보","식량안보","핵심광물","공급망"]
      - {name: "description", label: "요약", widget: "text"}
      - {name: "date", label: "날짜", widget: "string"}
      - {name: "author", label: "작성자", widget: "string", default: "편집부"}
      - {name: "image", label: "이미지", widget: "image", required: false}

  - name: "list-articles"
    label: "리스트 기사"
    label_singular: "기사"
    folder: "content/list"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {name: "title", label: "제목", widget: "string"}
      - name: "category"
        label: "카테고리"
        widget: "select"
        options: ["공급망","핵심광물","제재·수출통제","반도체·AI"]
      - {name: "date", label: "날짜", widget: "string"}
      - {name: "author", label: "작성자", widget: "string", default: "편집부"}
      - {name: "image", label: "이미지", widget: "image", required: false}

  - name: "book-reviews"
    label: "책·논문 리뷰"
    label_singular: "리뷰"
    folder: "content/books"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {name: "book_title", label: "책/논문 제목", widget: "string"}
      - {name: "review_title", label: "리뷰 제목", widget: "string"}
      - {name: "author_name", label: "저자", widget: "string"}
      - {name: "snippet", label: "리뷰 요약", widget: "text"}
